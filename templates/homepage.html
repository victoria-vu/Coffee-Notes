{% extends 'base.html' %}

{% block title %}Homepage{% endblock %}

{% block head %}

<style>
  
body {
  background-image: url("/static/img/homepage-bg.jpg");
  background-position: 35% 35%;
  background-repeat: no-repeat;
  background-attachment: fixed;
}

.container {
  padding: 25x 30px;
  margin-top: 15%;
}

h1 {
  font-size: 60px;
}

</style>

{% endblock %}



{% block body %}

<main>
<div class="container">
  <div class="col-lg-6">
    <h1>Coffee Notes</h1>
    <p class="lead">Keep track of your favorite spots and save cafes you would like to visit in the future, all in one place. Let's find your favorite coffee note.</p>
    <a href="/signup">
      <button type="button" class="submit-btn">Get Started</button>
    </a>
  </div>
</div>
</main>

{% endblock %}
