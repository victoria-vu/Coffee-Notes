{% extends 'base.html' %}

{% block title %}Homepage{% endblock %}

{% block body %}
<center><h1>Welcome Back, {{ name }}!</h1>
<h4>Let's look for a coffee shop.</h4>

<div>
      <form action="/cafe/search" method="GET">
        <div>
          <label for="search-term">Cafe Name or Keyword</label><br>
          <input type="text" name="term" placeholder="Cafe Name" id="search-term">
        </div>

        <div>
          <label for="search-location">Location</label><br>
          <input type="text" name="location" id="search-location" placeholder="E.g. New York" required="">
        </div>  

        <div>
            <button type="submit">Search</button>
        </div>
      </form>
</div>
</center>

{% endblock %}
